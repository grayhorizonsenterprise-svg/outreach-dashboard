services:
  - type: web
    name: ghe-dashboard
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn approval_dashboard:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --keep-alive 5
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        value: Alex
    disk:
      name: ghe-data
      mountPath: /data
      sizeGB: 1
