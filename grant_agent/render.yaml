services:
  - type: web
    name: ghe-grant-agent
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # gunicorn + uvicorn worker = production-ready, survives crashes, auto-restarts
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --keep-alive 10 --log-level info
    healthCheckPath: /health
    # Render restarts the service automatically on crash
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RENDER
        value: "true"
      - key: ENV
        value: production
      - key: SCAN_HOUR
        value: "6"
      - key: SCAN_MINUTE
        value: "0"
      # Set these in the Render dashboard — never commit real keys
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
    disk:
      name: grant-agent-data
      mountPath: /data
      sizeGB: 1
