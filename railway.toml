[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn approval_dashboard:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --keep-alive 10 --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Set GRANT_AGENT_URL in Railway dashboard to the live grant agent service URL
# e.g. https://ghe-grant-agent.up.railway.app
